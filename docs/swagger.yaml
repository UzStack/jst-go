basePath: /api/v1
definitions:
  github_com_UzStack_jst-go_internal_shared_httpx.ErrorBody:
    properties:
      code:
        type: string
      details:
        additionalProperties: {}
        type: object
      message:
        type: string
    type: object
  github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorBody'
    type: object
  internal_modules_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_modules_auth.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  internal_modules_auth.RegisterRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      password:
        description: bcrypt silently truncates beyond 72 bytes
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  internal_modules_auth.TokenResponse:
    properties:
      access_expires_at:
        type: string
      access_token:
        type: string
      refresh_expires_at:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  internal_modules_user.ListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/internal_modules_user.UserResponse'
        type: array
      limit:
        type: integer
      offset:
        type: integer
      total:
        type: integer
    type: object
  internal_modules_user.SetRoleRequest:
    properties:
      role:
        enum:
        - user
        - admin
        type: string
    required:
    - role
    type: object
  internal_modules_user.UpdateMeRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  internal_modules_user.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: UzStack
    url: https://github.com/UzStack/jst-go
  description: Go clean architecture template — gin + pgx + sqlc + JWT auth.
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: jst-go API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user by email + password and returns tokens.
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Revokes the supplied refresh token so it can no longer be used.
      parameters:
      - description: Refresh token to revoke
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.RefreshRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
      summary: Logout
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid refresh token for a new access + refresh pair.
      parameters:
      - description: Refresh payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account and returns access + refresh tokens.
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_modules_auth.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /users:
    get:
      description: Returns a paginated, filterable list of users. Admin only.
      parameters:
      - description: Filter by email or name
        in: query
        name: search
        type: string
      - description: Page size (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Rows to skip (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_user.ListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List users (admin)
      tags:
      - users
  /users/{id}:
    get:
      description: Returns any user's profile by id. Admin only.
      parameters:
      - description: User id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_user.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user by id (admin)
      tags:
      - users
  /users/{id}/role:
    patch:
      consumes:
      - application/json
      description: Changes a user's role. Admin only.
      parameters:
      - description: User id
        in: path
        name: id
        required: true
        type: string
      - description: New role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_user.SetRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_user.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Set user role (admin)
      tags:
      - users
  /users/me:
    delete:
      description: Permanently deletes the authenticated user.
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete current user
      tags:
      - users
    get:
      description: Returns the authenticated user's profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_user.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: Updates the authenticated user's name.
      parameters:
      - description: Update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_user.UpdateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_user.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update current user
      tags:
      - users
  /ws:
    get:
      description: Authenticated WebSocket. Pass the access token via ?token= or the
        Authorization header. Echoes/broadcasts text messages to all connected clients.
      parameters:
      - description: Access token (browsers can't send the Authorization header)
        in: query
        name: token
        type: string
      responses:
        "101":
          description: Switching Protocols
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_UzStack_jst-go_internal_shared_httpx.ErrorResponse'
      summary: Open a WebSocket connection
      tags:
      - ws
securityDefinitions:
  BearerAuth:
    description: Type "Bearer <access_token>" in the Value field.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
