basePath: /api/v1
definitions:
  github_com_example_goapp_internal_shared_httpx.ErrorBody:
    properties:
      code:
        type: string
      details:
        additionalProperties: {}
        type: object
      message:
        type: string
    type: object
  github_com_example_goapp_internal_shared_httpx.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorBody'
    type: object
  internal_modules_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_modules_auth.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  internal_modules_auth.RegisterRequest:
    properties:
      email:
        type: string
      name:
        maxLength: 100
        minLength: 1
        type: string
      password:
        maxLength: 128
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  internal_modules_auth.TokenResponse:
    properties:
      access_expires_at:
        type: string
      access_token:
        type: string
      refresh_expires_at:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  internal_modules_user.UpdateMeRequest:
    properties:
      name:
        maxLength: 100
        minLength: 1
        type: string
    required:
    - name
    type: object
  internal_modules_user.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: admin@jscorp.uz
    name: JscorpTech
    url: https://github.com/JscorpTech/jst-go
  description: Go clean architecture template — gin + pgx + sqlc + JWT auth.
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: jst-go API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user by email + password and returns tokens.
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Exchanges a valid refresh token for a new access + refresh pair.
      parameters:
      - description: Refresh payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_auth.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
      summary: Refresh access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account and returns access + refresh tokens.
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_modules_auth.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /users/me:
    delete:
      description: Permanently deletes the authenticated user.
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete current user
      tags:
      - users
    get:
      description: Returns the authenticated user's profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_user.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - users
    patch:
      consumes:
      - application/json
      description: Updates the authenticated user's name.
      parameters:
      - description: Update payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_modules_user.UpdateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_modules_user.UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_example_goapp_internal_shared_httpx.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update current user
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: Type "Bearer <access_token>" in the Value field.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
