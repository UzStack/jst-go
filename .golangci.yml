run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - misspell
    - unconvert
    - gosec
    - gofmt
    - goimports

linters-settings:
  gosec:
    excludes:
      - G104 # unhandled errors are covered by errcheck

issues:
  exclude-rules:
    # Test files: allow unchecked errors and noisy security rules.
    - path: _test\.go
      linters:
        - errcheck
        - gosec
