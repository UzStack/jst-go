services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jstgo
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DB_HOST: db
      APP_DB_PORT: 5432
      APP_DB_USER: postgres
      APP_DB_PASSWORD: postgres
      APP_DB_NAME: jstgo
      APP_ENV: development # dev: RS256 keylar /app/keys ichida avtomatik generatsiya bo'ladi
    ports:
      - "8080:8080"

volumes:
  dbdata:
